name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build artifacts
        run: ./script/package.sh all

      - name: Validate artifacts
        run: |
          lipo -info dist/ClipLAN.app/Contents/MacOS/ClipLAN
          lipo -info dist/ClipLAN.app/Contents/Frameworks/libPasteCore.dylib
          hdiutil verify dist/ClipLAN.dmg
          installer -pkg dist/ClipLAN.pkg -target / -showChoicesXML >/tmp/cliplan-choices.xml
          plutil -lint /tmp/cliplan-choices.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClipLAN-${{ github.sha }}
          path: |
            dist/ClipLAN.dmg
            dist/ClipLAN.zip
            dist/ClipLAN.pkg
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          cat >release-notes.md <<EOF
          Automated ClipLAN build for ${tag}.

          These artifacts are unsigned/ad-hoc signed CI builds. macOS may require manual approval in Privacy & Security. Public distribution builds should use Developer ID signing and notarization.
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/ClipLAN.dmg dist/ClipLAN.zip dist/ClipLAN.pkg --clobber
          else
            gh release create "$tag" dist/ClipLAN.dmg dist/ClipLAN.zip dist/ClipLAN.pkg \
              --title "$tag" \
              --notes-file release-notes.md
          fi
